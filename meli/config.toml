# ====================================================================
# Colemak-DH "neio" navigation remap (added 2026-04-21)
# ====================================================================
# Right-hand home row: n / e / i / o = left / down / up / right
# Mirrors vim's h / j / k / l convention for the equivalent physical
# key positions under Colemak-DH.
#
# Uppercase shifts preserve meli's mailbox/account navigation convention
# (NEXT on left-of-axis shift, PREV on right-of-axis shift, as per defaults).

[shortcuts.general]
scroll_left = 'n'
scroll_down = 'e'
scroll_up = 'i'
scroll_right = 'o'
# next_search_result was on 'n' — move to Meta to free it up.
# previous_search_result stays at default 'N' (uppercase, uncontested).
next_search_result = 'M-n'

[shortcuts.listing]
# Arrows for hold-repeat scrolling via the ZMK NAV layer (2026-04-27). Home-row
# mods on i/e mean OS-level key-repeat-on-hold never fires (hold = modifier,
# never letter), so the only way to traverse a long mailbox quickly is a key
# without hold-mod behaviour. Helix retains both i/e (custom) and arrows
# (Helix default) — meli is one-key-per-action (TOML rejects `['i','Up']`)
# so we pick arrows here. i/e taps still scroll via [shortcuts.general]
# as a generic fallback (rarely fires in listing context).
scroll_up = 'Up'
scroll_down = 'Down'
# Ctrl+R = refresh, the platform-conventional reload key. Runs each
# account's refresh_command (defined per-account above) then meli
# re-reads the notmuch DB. Cmd+R is intercepted by the terminal
# emulator on macOS so isn't an option; meli's shortcut grammar
# only knows C-/M- modifiers. C-r is unbound in the listing context;
# the envelope-view (reply_to_author) and thread-view
# (reverse_thread_order) defaults are unaffected because shortcut
# sections are scoped.
refresh = 'C-r'
# Displaced bindings (conflicted with neio movement):
set_seen = 's'                  # was 'n'
exit_entry = 'Backspace'        # was 'i'. Not 'Esc' — meli has built-in Esc handlers in listing contexts (listing.rs:2148, :2625) that consume Esc before the shortcut dispatcher sees it, so custom Esc bindings on listing actions are unreliable. Backspace has no such precedence issue. Context-safe: text-input contexts (`:` cmd, `/` search, form fields) handle Backspace as delete-char via CmdInput/InsertInput events, falling through to exit_entry only when no text input is active.
intersection_modifier = 'M-i'   # was 'i' (rarely used)
# Mailbox / account navigation (uppercase shifts of neio):
next_mailbox = 'E'              # was 'J'
prev_mailbox = 'I'              # was 'K'
next_account = 'N'              # was 'H'
prev_account = 'O'              # was 'L'

# `D` → trash (tag-based, works for both Gmail and COHS).
# Default `send_to_trash` is folder-based and effectively no-op on
# notmuch backends. Custom command tags `trash` + strips `inbox` so
# the message disappears from inbox view immediately.
# Server-side propagation differs per account:
# - Gmail: gmail-push-tags pushes the tags as Gmail labels
#   (adds TRASH, removes INBOX) on its 15-min tick.
# - COHS:  cohs-trash-mover (launchd/systemd timer, every 5 min)
#   moves the maildir file to cohs/Deleted Items/cur; mbsync's
#   next tick replicates to M365 server. End-to-end latency 0–20 min.
commands = [
    # Lowercase `d` — capital `D` is bound to meli's built-in
    # `send_to_trash`, which is folder-based and a silent no-op on
    # notmuch backends. The default consumed the keystroke without
    # firing our custom command. Switching to `d` (matching meli's
    # own docs example for tag-based trashing) sidesteps the conflict.
    { command = ["tag add trash", "tag remove inbox"], shortcut = "d" },
    # Backspace → close current tab. meli's `Enter` on a message opens the
    # envelope in a NEW TAB (not a modal layer), so the way back to the
    # listing is `:close`. exit_entry doesn't fire from envelope context
    # because it's a separate tab. Bind the muscle-memory key to do the
    # right thing.
    #
    # Safe in other contexts: meli's text-input modes (composer, search,
    # `:` cmd bar) consume Backspace as delete-char before the shortcut
    # dispatcher sees it. On the listing tab itself, `:close` is likely
    # a no-op (main tab is non-closeable) — to verify in practice.
    { command = ["close"], shortcut = "Backspace" },
]

[shortcuts.pager]
# Arrows for hold-repeat scrolling (see [shortcuts.listing] note).
scroll_up = 'Up'
scroll_down = 'Down'

[shortcuts.thread-view]
scroll_up = 'Up'
scroll_down = 'Down'
# thread-view.collapse_subtree default 'h' retained (doesn't conflict with neio)

[shortcuts.contact-list]
scroll_up = 'Up'
scroll_down = 'Down'

# [shortcuts.envelope-view] block removed 2026-04-29.
#
# An earlier attempt added `exit_entry = 'Backspace'` here. That was a
# no-op at best — `exit_entry` is NOT a valid envelope-view setting per
# the meli.conf manpage (it lives only in [shortcuts.listing]). At
# worst, the unknown-setting may have caused meli to silently skip
# loading other envelope-view shortcuts entirely, breaking `Esc`, `r`,
# and other expected exits. With the block removed, envelope-view uses
# pure defaults and exits should fire as documented.
#
# How to exit envelope view back to listing: investigation in progress
# — meli's envelope-view shortcut list (per manpage) doesn't actually
# expose an exit binding. Likely relies on the listing's `exit_entry`
# (your Backspace) propagating in. If not, will need a different
# mechanism (e.g. pager-shortcut `q` if the body pager has focus).

# Not remapped: [shortcuts.composing].
# Has 'e' bound to "edit" which is the correct primary action in that
# context. Scroll-navigation within a composed message is rare;
# keeping 'e' as edit avoids a trivial conflict.
