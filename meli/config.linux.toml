"mail.listing.attachment_flag"    = { fg = "$cyan",    bg = "theme_default", attrs = "theme_default" }
"mail.listing.thread_snooze_flag" = { fg = "$red",     bg = "theme_default", attrs = "theme_default" }
"mail.listing.tag_default"        = { fg = "$base03",  bg = "$violet", attrs = "Bold" }
