"mail.listing.conversations.unseen"        = { fg = "$base3",  bg = "theme_default", attrs = "Bold" }
"mail.listing.conversations.highlighted"   = { fg = "theme_default", bg = "$base02", attrs = "Bold" }
"mail.listing.conversations.selected"      = { fg = "$base3",  bg = "$blue",   attrs = "theme_default" }
"mail.listing.conversations.highlighted_selected" = { fg = "$base3", bg = "$blue", attrs = "Reverse" }

"mail.view.headers"          = { fg = "$blue",   bg = "theme_default", attrs = "theme_default" }
"mail.view.headers_names"    = { fg = "$cyan",   bg = "theme_default", attrs = "Bold" }
"mail.view.headers_area"     = { fg = "theme_default", bg = "theme_default", attrs = "theme_default" }
"mail.view.body"             = { fg = "theme_default", bg = "theme_default", attrs = "theme_default" }

"mail.view.thread.indentation.a" = { fg = "theme_default", bg = "$blue",    attrs = "theme_default" }
"mail.view.thread.indentation.b" = { fg = "theme_default", bg = "$red",     attrs = "theme_default" }
"mail.view.thread.indentation.c" = { fg = "theme_default", bg = "$magenta", attrs = "theme_default" }
"mail.view.thread.indentation.d" = { fg = "theme_default", bg = "$yellow",  attrs = "theme_default" }
