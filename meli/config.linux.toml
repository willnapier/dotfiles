# meli configuration — Linux (nimbini)
# ~/.config/meli/config.toml  (deployed via dotter linux.files)
#
# Differences from config.toml (macOS):
#   - root_mailbox uses /home/will/Mail
#   - library_file_path points to system libnotmuch on Arch
#   - refresh_command paths use /usr/bin/ and /home/will/.local/bin/

[accounts.workspace]
root_mailbox = "/home/will/Mail"
format = "notmuch"
library_file_path = "/usr/lib/libnotmuch.so.5"
identity = "will@willnapier.com"
display_name = "William Napier"
subscribed_mailboxes = ["inbox", "unread", "sent", "archive", "all-mail"]
default_mailbox = "inbox"
send_mail = "msmtp --account=gmail --read-recipients --read-envelope-from"
refresh_command = "/home/will/.local/bin/mail-sync"

  [accounts.workspace.mailboxes."inbox"]
  query = "tag:inbox and not tag:archive and not tag:spam and not tag:trash and date:6M.."

  [accounts.workspace.mailboxes."unread"]
  query = "tag:unread"

  [accounts.workspace.mailboxes."sent"]
  query = "tag:sent"

  [accounts.workspace.mailboxes."archive"]
  query = "not tag:inbox and not tag:trash and not tag:spam and not tag:sent"

  [accounts.workspace.mailboxes."all-mail"]
  query = "date:90d.."

# =====================================================================
# COHS account (Microsoft 365)
# =====================================================================
# Sync: mbsync pulls outlook.office365.com → ~/Mail/cohs/ via XOAUTH2
#       using `pizauth show cohs` as PassCmd.
# Send: `practiceforge email graph-send` (tenant blocks SMTP AUTH).

[accounts.cohs]
root_mailbox = "/home/will/Mail"
format = "notmuch"
library_file_path = "/usr/lib/libnotmuch.so.5"
identity = "will.napier@changeofharleystreet.com"
display_name = "Will Napier"
subscribed_mailboxes = ["inbox", "unread", "sent", "drafts", "archive", "trash", "spam"]
default_mailbox = "inbox"
send_mail = "practiceforge email graph-send"
refresh_command = "sh -c '/usr/bin/mbsync cohs && /usr/bin/notmuch new'"

  [accounts.cohs.mailboxes."inbox"]
  query = "tag:cohs and tag:inbox and not tag:archive and not tag:spam and not tag:trash"

  [accounts.cohs.mailboxes."unread"]
  query = "tag:cohs and tag:unread and not tag:trash and not tag:spam"

  [accounts.cohs.mailboxes."sent"]
  query = "tag:cohs and tag:sent"

  [accounts.cohs.mailboxes."drafts"]
  query = "tag:cohs and tag:drafts"

  [accounts.cohs.mailboxes."archive"]
  query = "tag:cohs and tag:archive"

  [accounts.cohs.mailboxes."trash"]
  query = "tag:cohs and tag:trash"

  [accounts.cohs.mailboxes."spam"]
  query = "tag:cohs and tag:spam"

[listing]
sidebar_ratio = 80

[pager]
filter = "cat"
html_filter = "w3m -T text/html"
pager_context = 2

[notifications]
enable = true

[terminal]
theme = "solarized_dark"

# Solarized Dark — mirrors ghostty/themes/solarized-dark.
# Only keys with hardcoded non-theme_default colors are overridden; the rest
# inherit from the built-in `dark` theme via theme_default cascade.
[terminal.themes."solarized_dark"]
color_aliases = { base03 = "#002b36", base02 = "#073642", base01 = "#586e75", base00 = "#657b83", base0 = "#839496", base1 = "#93a1a1", base2 = "#eee8d5", base3 = "#fdf6e3", yellow = "#b58900", orange = "#cb4b16", red = "#dc322f", magenta = "#d33682", violet = "#6c71c4", blue = "#268bd2", cyan = "#2aa198", green = "#859900" }

"theme_default"              = { fg = "$base0",  bg = "$base03", attrs = "Default" }
"error_message"              = { fg = "$red",    bg = "theme_default", attrs = "theme_default" }
"text.unfocused"             = { fg = "$base01", bg = "theme_default", attrs = "Dim" }
"text.error"                 = { fg = "$red",    bg = "theme_default", attrs = "theme_default" }
"text.highlight"             = { fg = "$blue",   bg = "theme_default", attrs = "Reverse" }
"highlight"                  = { fg = "$base03", bg = "$base1",  attrs = "Bold" }

"status.bar"                 = { fg = "$base2",  bg = "$blue",   attrs = "theme_default" }
"status.command_bar"         = { fg = "$base03", bg = "$yellow", attrs = "theme_default" }
"status.history"             = { fg = "$base0",  bg = "$base02", attrs = "theme_default" }
"status.history.hints"       = { fg = "$base03", bg = "$yellow", attrs = "theme_default" }
"status.notification"        = { fg = "$magenta", bg = "theme_default", attrs = "theme_default" }

"tab.focused"                = { fg = "$base3",  bg = "theme_default", attrs = "Bold" }
"tab.unfocused"              = { fg = "$base01", bg = "theme_default", attrs = "theme_default" }
"tab.bar"                    = { fg = "theme_default", bg = "theme_default", attrs = "theme_default" }

"widgets.list.header"        = { fg = "$base03", bg = "$base1",  attrs = "Bold" }
"widgets.form.highlighted"   = { fg = "$base3",  bg = "$base02", attrs = "theme_default" }
"widgets.options.highlighted" = { fg = "$base3", bg = "$base02", attrs = "theme_default" }

"mail.sidebar_unread_count"  = { fg = "$base01", bg = "mail.sidebar", attrs = "mail.sidebar" }
"mail.sidebar_index"         = { fg = "$base01", bg = "mail.sidebar", attrs = "mail.sidebar" }
"mail.sidebar_highlighted"   = { fg = "$base03", bg = "$base1",  attrs = "mail.sidebar" }
"mail.sidebar_highlighted_account" = { fg = "$base3", bg = "$base02", attrs = "mail.sidebar_highlighted" }

"mail.listing.compact.even"           = { fg = "theme_default", bg = "$base02", attrs = "theme_default" }
"mail.listing.compact.odd"            = { fg = "theme_default", bg = "theme_default", attrs = "theme_default" }
"mail.listing.compact.even_unseen"    = { fg = "$base3",  bg = "$base02", attrs = "Bold" }
"mail.listing.compact.odd_unseen"     = { fg = "$base3",  bg = "theme_default", attrs = "Bold" }
"mail.listing.compact.even_selected"  = { fg = "$base3",  bg = "$blue",   attrs = "theme_default" }
"mail.listing.compact.odd_selected"   = { fg = "$base3",  bg = "$blue",   attrs = "theme_default" }
"mail.listing.compact.even_highlighted" = { fg = "theme_default", bg = "$base02", attrs = "Bold" }
"mail.listing.compact.odd_highlighted"  = { fg = "theme_default", bg = "$base02", attrs = "Bold" }
"mail.listing.compact.even_highlighted_selected" = { fg = "$base3", bg = "$blue", attrs = "Reverse" }
"mail.listing.compact.odd_highlighted_selected"  = { fg = "$base3", bg = "$blue", attrs = "Reverse" }

"mail.listing.plain.even"             = { fg = "theme_default", bg = "$base02", attrs = "theme_default" }
"mail.listing.plain.odd"              = { fg = "theme_default", bg = "theme_default", attrs = "theme_default" }
"mail.listing.plain.even_unseen"      = { fg = "$base3",  bg = "$base02", attrs = "Bold" }
"mail.listing.plain.odd_unseen"       = { fg = "$base3",  bg = "theme_default", attrs = "Bold" }
"mail.listing.plain.even_selected"    = { fg = "$base3",  bg = "$blue",   attrs = "theme_default" }
"mail.listing.plain.odd_selected"     = { fg = "$base3",  bg = "$blue",   attrs = "theme_default" }
"mail.listing.plain.even_highlighted" = { fg = "theme_default", bg = "$base02", attrs = "Bold" }
"mail.listing.plain.odd_highlighted"  = { fg = "theme_default", bg = "$base02", attrs = "Bold" }
"mail.listing.plain.even_highlighted_selected" = { fg = "$base3", bg = "$blue", attrs = "Reverse" }
"mail.listing.plain.odd_highlighted_selected"  = { fg = "$base3", bg = "$blue", attrs = "Reverse" }

"mail.listing.conversations"               = { fg = "$base01", bg = "theme_default", attrs = "theme_default" }
"mail.listing.conversations.subject"       = { fg = "theme_default", bg = "theme_default", attrs = "theme_default" }
