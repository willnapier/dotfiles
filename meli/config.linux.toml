# ====================================================================
# Colemak-DH "neio" navigation remap
# ====================================================================

[shortcuts.general]
scroll_left = 'n'
scroll_down = 'e'
scroll_up = 'i'
scroll_right = 'o'
next_search_result = 'M-n'

[shortcuts.listing]
scroll_up = 'i'
scroll_down = 'e'
refresh = 'C-r'
set_seen = 's'
exit_entry = 'Backspace'
intersection_modifier = 'M-i'
next_mailbox = 'E'
prev_mailbox = 'I'
next_account = 'N'
prev_account = 'O'

[shortcuts.pager]
scroll_up = 'i'
scroll_down = 'e'

[shortcuts.thread-view]
scroll_up = 'i'
scroll_down = 'e'

[shortcuts.contact-list]
scroll_up = 'i'
scroll_down = 'e'
