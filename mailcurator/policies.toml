# =====================================================================
# Reference-data policies (added 2026-04-29)
# =====================================================================
# Lifecycle rule of thumb: archive forever for anything with financial,
# legal or legacy interest (orders, journeys, vehicle records). Trash
# only for pure noise (promos). Extracted facts land in jsonl files
# under ~/.local/share/mailcurator/<category>.jsonl which become the
# authoritative store — query subcommands TBD (Stage 4).

# Trainline — train journey records.
# Reference data: archive forever. Journeys often booked 2-3 weeks
# advance, so the email has live operational value until the trip,
# then legacy/financial value indefinitely. Feeds journeys.jsonl.
[[policy]]
name = "trainline-journeys"
from = "@comms.trainline.com"
# Tight subject filter for transactional only — exclude marketing
# ("Earth Day", "Why pay the full fare?", "Splitting and saving").
# Patterns derived from preview run 2026-04-29. Marketing emails are
# captured by the trainline-promo policy below and quarantine-trashed.
subject_contains_any = ["Thanks for booking", "Get ready for", "Your trip", "Alert:", "Delay Repay", "Your refund", "Booking confirmation"]
vendor_module = "trainline_journeys"
intended_categories = ["journey"]
archive_after_days = 7
# delete_after_days deliberately omitted — keep forever

[[policy.extractor]]
category = "journeys"

[[policy.extractor.field]]
name = "subject"
header = "Subject"

[[policy.extractor.field]]
name = "received"
header = "Date"

[[policy.extractor.field]]
name = "operator"
literal = "Trainline"

[[policy.extractor.field]]
name = "journey_date"
body_regex = '(\d{1,2}\s+\w{3,9}\s+\d{4})'
kind = "date"

[[policy.extractor.field]]
name = "journey_time"
body_regex = '\b(\d{2}:\d{2})\b'

[[policy.extractor.field]]
name = "fare"
body_regex = '£([0-9]+\.\d{2})'

[[policy.extractor.field]]
name = "booking_ref"
body_regex = '(?:Booking ref|Reference|Confirmation\s+code)[:\s]+([A-Z0-9]{5,12})'

# trainline-promo: marketing/savings/seasonal noise. Same booking-vs-
# marketing pattern as Airbnb. Quarantine-then-trash per the
# 2026-04-23 "quarantine first on new destroy policies" rule. No
# extractor — these messages have nothing to capture; just trash on
# a delay.
[[policy]]
name = "trainline-promo"
from = "@comms.trainline.com"
subject_contains_any = ["Earth Day", "Why pay", "splitting and saving", "saving on trains", "More ways to save", "Disrupted travel", "Refund rules", "Spend less", "Train Swap", "Today's the day", "saving that"]
intended_categories = ["promo"]
archive_after_days = 3
delete_after_days = 30

# Amazon orders — order confirmations (NOT shipping, NOT promos).
# Reference data: archive forever. Financial relevance for years
# (warranties, returns, tax). Tight subject filter to avoid catching
# shipping notifications (those are amazon-shipping → deliveries.jsonl)
# or promos (those are amazon-promos → trash).
[[policy]]
name = "amazon-orders"
from = "@amazon.co.uk"
# ORDER PLACEMENT ONLY. amazon-shipping owns dispatch/delivery
# ("Dispatched:", "Out for delivery:", "Delivered:") — don't overlap.
# Modern Amazon order-placement subjects (per 2026-04-29 inbox sample):
#   "Amazon.co.uk order of <title>."
#   "Ordered: '<title>'"
# Plus legacy/marketplace seller patterns.
subject_contains_any = ["Amazon.co.uk order of", "Ordered:", "Thank you for your order"]
# Vendor module: CSS-selector-based HTML parsing — anchors total on
# <b>Grand Total:</b> instead of first "Total" text (which the older
# generic body_regex was matching, occasionally capturing subtotals).
vendor_module = "amazon_orders"
intended_categories = ["order"]
archive_after_days = 7
# delete_after_days deliberately omitted — keep forever

[[policy.extractor]]
category = "orders"

[[policy.extractor.field]]
name = "subject"
header = "Subject"

[[policy.extractor.field]]
name = "received"
header = "Date"

[[policy.extractor.field]]
name = "vendor"
literal = "Amazon"

[[policy.extractor.field]]
name = "order_id"
body_regex = '(\d{3}-\d{7}-\d{7})'

[[policy.extractor.field]]
name = "total"
body_regex = '(?:Order [Tt]otal|Grand [Tt]otal|Total)[:\s]*£([0-9]+\.\d{2})'

[[policy.extractor.field]]
name = "eta"
subject_regex = 'arriving\s+([\w\s,]+?)(?:[,\.]|$)'

# Amazon promos — pure noise. Quarantine at 7d initially per the
# "quarantine first on new destroy policies" rule. After a week of no
# false positives, drop to delete_after_days = 0 for instant trash.
[[policy]]
name = "amazon-promos"
from = "@amazon.co.uk"
# Broadened wider per preview — initial filter caught only 14 historic
# 2008–2010 promos; modern Amazon promo subjects differ. Sample below
# pending refinement after live-traffic observation.
subject_contains_any = ["Today's Deals", "Lightning Deal", "Lightning Deals", "Prime Day", "Spring Sale", "Summer Sale", "Black Friday", "Cyber Monday", "% off", "Save up to", "Recommended for you", "Hot picks", "Top deals", "Trending", "deals you'll love", "We thought you might like", "Picks for you", "Suggested for you", "based on your", "Inspired by your"]
intended_categories = ["promo"]
delete_after_days = 7
# Tighten to 0 once destroy-preview is clean across at least one week.
# Tighten/broaden subject list as live preview surfaces FP/FN.

# Tesla — vehicle records (service appointments, supercharger receipts,
# software releases, marketing). All archived. Tessie (lifetime sub) is
# the live data source, but emails are the paper trail for tax-relevant
# amounts and service history. Cheap insurance.
[[policy]]
name = "tesla"
from = "@tesla.com"
# Tightened 2026-04-30: was catching everything from @tesla.com
# (152 emails, 67% noise). Now scoped to actual vehicle records:
# service appointments, supercharger payments, premium connectivity
# subscriptions, payment receipts. Marketing / software-release /
