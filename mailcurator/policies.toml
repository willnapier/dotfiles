body_regex = 'billed on an annual basis for (=A3\d+|£\d+)'

[[policy.extractor.field]]
name = "frequency"
literal = "annual"

[[policy.extractor.field]]
name = "subject"
header = "Subject"

[[policy.extractor.field]]
name = "from"
header = "From"

