# Apple Developer Program enrollment confirmation. Different sender
# (developer@email.apple.com) than App Store receipts. Body confirms:
# "I will be billed on an annual basis for £79"
# "I can cancel automatic renewal at any time up to 24 hours before"
# Renewal date is NOT in the enrollment email — a separate reminder
# arrives close to the renewal. We extract enrollment terms now, and
# synthesise computes next_renewal = enrollment_ts + 1y as a fallback.
[[policy]]
name = "apple-developer-program"
from = "developer@email.apple.com"
subject_contains_any = ["automatic renewal", "Welcome to the Apple Developer Program"]
intended_categories = ["invoice"]
on_arrival.tags_add = ["receipts"]

[[policy.extractor]]
