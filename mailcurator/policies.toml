# =============================================================================
# Invoice senders — Category B; tag for findability, archive but never delete
# =============================================================================

[[policy]]
name = "apple-receipts"
from = "no_reply@email.apple.com"
intended_categories = ["invoice"]
archive_after_days = 14
on_arrival.tags_add = ["receipts"]

# Apple subscription renewal reminders — "Your Subscription Renewal" email
# announcing an upcoming auto-renewal date and amount. Track B Agent C.
# Writes to ~/.local/share/mailcurator/subscriptions.jsonl.
[[policy]]
name = "apple-subscription-renewals"
from = "no_reply@email.apple.com"
subject_contains = "Subscription Renewal"
intended_categories = ["invoice"]
on_arrival.tags_add = ["receipts"]
# No archive/delete: lifecycle is owned by apple-receipts policy. This
# policy exists purely for extraction.

[[policy.extractor]]
category = "subscriptions"

[[policy.extractor.field]]
name = "event"
literal = "renewal_reminder"

[[policy.extractor.field]]
name = "service"
literal = "apple.com"

[[policy.extractor.field]]
name = "next_renewal"
body_regex = 'Starting from (\d{1,2}\s+\w+\s+\d{4}),\s*your subscription'
kind = "date"

[[policy.extractor.field]]
name = "amount"
body_regex = 'automatically renews for (£\d+\.\d+)'

[[policy.extractor.field]]
name = "frequency"
body_regex = 'automatically renews for £\d+\.\d+/(year|month|week)'

[[policy.extractor.field]]
name = "subject"
header = "Subject"

[[policy.extractor.field]]
name = "from"
header = "From"

# Apple subscription charges — "Your invoice from Apple." emails containing
# subscription line items. Body markers (Monthly|Annual|Yearly) and "Renews
# <date>" reliably differentiate subscription renewals from ad-hoc App Store
# purchases. Records for ad-hoc purchases will still be written but with
# `frequency` and `next_renewal` absent — the synth layer can filter on
# their presence. Track B Agent C.
[[policy]]
name = "apple-subscription-charges"
from = "no_reply@email.apple.com"
subject_contains = "invoice from Apple"
intended_categories = ["invoice"]
on_arrival.tags_add = ["receipts"]
# No archive/delete: lifecycle owned by apple-receipts policy.

[[policy.extractor]]
category = "subscriptions"

[[policy.extractor.field]]
name = "event"
literal = "charged"

[[policy.extractor.field]]
name = "service"
literal = "apple.com"

[[policy.extractor.field]]
name = "frequency"
body_regex = '\((Monthly|Annual|Yearly)\)'

[[policy.extractor.field]]
name = "next_renewal"
body_regex = 'Renews (\d{1,2}\s+\w+\s+\d{4})'
kind = "date"

# Total charged amount. Apple receipts use two formats over time:
#   newer: "MasterCard •••• 8923 (Apple Pay) £8.99"  (final line of receipt)
#   older: "TOTAL £8.99"                              (uppercase keyword)
# Match either; the regex engine takes the first hit. The card pattern is
# anchored to common UK methods to reduce false positives from other £
# values elsewhere on the page.
[[policy.extractor.field]]
name = "amount"
body_regex = '(?:TOTAL\s*|(?:MasterCard|Visa|American Express|Apple Pay)[^£]{0,80})(£\d+\.\d+)'

[[policy.extractor.field]]
name = "subject"
header = "Subject"

[[policy.extractor.field]]
name = "from"
header = "From"

# PayPal — receipts, automatic payments, donations, refunds. Captures
# rich payee context (recipient name, transaction ID, amount) at receive-
# time before the PayPal web UI eventually drops it. Two body formats
# coexist:
#   modern (paypal.co.uk, ~2014+): HTML "You paid £130.87 GBP to
#     Dropbox Internationa..." + "Transaction ID: 6RR24898VN115122M" or
#     "Order ID 752043806496692734".
#   legacy (paypal.com, pre-2012): plaintext "You sent a payment of
#     £11.50 GBP to Skype" + "Transaction ID: 12A51843FK610412T".
# Both share £NN.NN GBP and Transaction/Order ID labelling, so a single
# extractor covers them. Counterparty is best taken from Subject which is
# more deterministic than body across email types. Tax-relevant — never
# delete, archive only. `from = "@paypal"` is broader than `@paypal.co.uk`
# to also catch the older paypal.com receipts (~30 historical receipts);
# the few non-receipt operational mails (login, password) are harmless —
# they extract nothing beyond vendor + subject + received.
[[policy]]
name = "paypal-receipts"
from = "@paypal"
intended_categories = ["invoice"]
archive_after_days = 14
on_arrival.tags_add = ["receipts"]

[[policy.extractor]]
category = "bills"

[[policy.extractor.field]]
name = "vendor"
literal = "PayPal"

# counterparty: extracted from Subject. Ordered alternations (longest first)
# cover ~92% of subjects — the dominant "Receipt for your payment to X"
# plus automatic payments, donations, scheduled-purchase, refund, invoice.
# The remainder are operational emails (login/password/legal) which
# legitimately have no counterparty.
[[policy.extractor.field]]
name = "counterparty"
subject_regex = '(?:[Rr]eceipt for [Yy]our [Pp]ayment to|[Rr]eceipt for [Yy]our donation to|sent an automatic payment to|[Yy]ou just sent a payment to|[Yy]ou have authorised a payment to|donated.*?to benefit|donated to benefit|[Yy]ou.ve authorised a payment to|[Yy]our payment to|[Yy]ou.ve paid|[Yy]ou.ve submitted an order in the amount of [^ ]+ [A-Z]+ to|payment for your purchase with|payment for your|payment for|[Rr]efund from|[Ii]nvoice from|[Rr]eceipt for [Yy]our)\s+([^:£$¥]+?)(?:\s+(?:has been processed|purchase|for invoice|—|would like to be paid|-)|:|$)'

# amount_gbp: matches "£NN.NN GBP" (modern UTF-8 quoted-printable) or
# "&pound;NN.NN GBP" (mid-era HTML entity used by Uber, Donation via
# PayPal Giving Fund, etc.). The body has multiple £ amounts (subtotal,
# total, payment, etc.) — extractors take the first match, which is
# reliably the headline amount across formats. Legacy paypal.com
# windows-1252 receipts have an unencoded byte that mailcurator may
# leave as a replacement char; those receipts often lack any £/GBP
# context altogether (Netflix/TIDAL ~2010s) and are genuinely
# non-extractable on amount.
[[policy.extractor.field]]
name = "amount_gbp"
body_regex = '(?:£|&pound;)\s*(\d+(?:\.\d{1,2})?)\s*GBP'

[[policy.extractor.field]]
name = "currency"
literal = "GBP"

# transaction_id: PayPal's reference. Modern receipts use "Transaction ID"
# OR "Order ID" (post-2024 templates), automatic payments add "Profile ID"
# for recurring billing agreements. ~91% of payment emails carry one.
[[policy.extractor.field]]
name = "transaction_id"
body_regex = '(?:Transaction ID|Order ID|Profile ID)[:\s]*([A-Za-z0-9\-]{8,30})'

# note: best-effort. Captures the "Invoice ID" reference value when the
# merchant supplies one (Uber, legacy paypal.com receipts that include
# an Invoice ID: line). Restricted to alphanumeric tokens to avoid the
# greedy-capture failure mode where stripped-HTML rolls "Invoice ID
# <id> Description Unit price Qty Amount £NN GBP..." into the field.
[[policy.extractor.field]]
name = "note"
body_regex = 'Invoice ID[:\s]+([A-Za-z0-9_\-]{6,30})'

[[policy.extractor.field]]
name = "subject"
header = "Subject"

[[policy.extractor.field]]
name = "received"
header = "Date"

[[policy.extractor.field]]
name = "message_id"
header = "Message-ID"

[[policy]]
name = "brightpay-payroll"
from = "docs@brightpay.co.uk"
intended_categories = ["invoice"]
archive_after_days = 30
on_arrival.tags_add = ["billing"]

[[policy]]
