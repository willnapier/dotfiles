# =============================================================================
# Utility / billing senders — added 2026-05-04. All write to bills.jsonl.
# Lifecycle: archive_after_days = 7, NO delete (HMRC reference window).
# Where vendor-side inline content is too thin (BT, vodafone-bills-centre,
# Direct Line — bill total hosted online behind a link), we keep the policy
# for inbox lifecycle but add only the fields we can verify from samples.
# =============================================================================

# Octopus Energy — DD reminders + monthly statements. Body shape:
#   "Direct Debit payment of £479.92 on 23rd April"
#   "Account no. - A-FFC74AF5"
# Some statements include the year ("23rd December 2024"); the FYI reminders
# omit it. We capture what's there; fd-budget's parse_due_date backfills the
# year from the message Date header.
#
# Two date fields:
#   - payment_date: legacy field, kept for backwards compat (raw "23rd April")
#   - due_date:     same value, but read by fd-budget enrich. The subject line
#                   carries it most reliably ("FYI: We'll take a £479.92
#                   payment on 23rd April"), so we anchor there. Statement
#                   emails ("FYI: Your energy statement") have no date in
#                   subject — that's expected null.
[[policy]]
name = "octopus-energy"
from = "@octopus.energy"
intended_categories = ["invoice"]
archive_after_days = 7
on_arrival.tags_add = ["receipts"]

[[policy.extractor]]
category = "bills"

[[policy.extractor.field]]
name = "vendor"
literal = "Octopus Energy"

[[policy.extractor.field]]
name = "amount"
body_regex = 'payment of\s*£(\d+\.\d{2})'

[[policy.extractor.field]]
name = "payment_date"
body_regex = 'payment of\s*£\d+\.\d{2}\s+on\s+(?:the\s+)?(\d{1,2}(?:st|nd|rd|th)?\s+\w+(?:\s+\d{4})?)'

[[policy.extractor.field]]
name = "due_date"
subject_regex = 'payment on\s+(\d{1,2}(?:st|nd|rd|th)?\s+\w+(?:\s+\d{4})?)'
kind = "date"

[[policy.extractor.field]]
name = "account"
body_regex = 'Account no\.\s*-\s*([A-Z]-[A-F0-9]+)'

[[policy.extractor.field]]
name = "subject"
header = "Subject"

[[policy.extractor.field]]
name = "received"
header = "Date"

# Virgin Media — "Your Virgin Media bill is ready". HTML-only emails;
# crude tag-strip exposes the inline £ amounts. Body shape:
#   "We will request £75.88 from your bank or building society"
#   "Account number: 633123701"
# Due date is NOT in body (just a generic "before the payment due date"
# warning). TODO: extract due date if Virgin ever surfaces it inline.
[[policy]]
name = "virgin-media"
from = "@virginmedia"
intended_categories = ["invoice"]
archive_after_days = 7
on_arrival.tags_add = ["receipts"]

[[policy.extractor]]
category = "bills"

[[policy.extractor.field]]
name = "vendor"
literal = "Virgin Media"

[[policy.extractor.field]]
name = "amount"
body_regex = '(?:We will request|comes to|Amount:|Bill total:|will request)\s*£(\d+\.\d{2})'

[[policy.extractor.field]]
name = "account"
body_regex = 'Account number:\s*(\d+)'

[[policy.extractor.field]]
name = "subject"
header = "Subject"

[[policy.extractor.field]]
name = "received"
header = "Date"

# BT — "Your latest bill is here" / "Your bill is ready". Body has
