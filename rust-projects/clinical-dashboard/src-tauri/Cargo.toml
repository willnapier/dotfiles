[package]
name = "clinical-dashboard"
version = "0.1.0"
description = "Clinical Dashboard — native app window"
edition = "2021"
rust-version = "1.77.2"

[lib]
name = "clinical_dashboard_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2" }

[dependencies]
serde_json = "1.0"
serde = { version = "1.0", features = ["derive"] }
log = "0.4"
tauri = { version = "2" }
tauri-plugin-log = "2"
url = "2"
