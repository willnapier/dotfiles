# Example mailcurator policies — copy to ~/.config/mailcurator/policies.toml
# and edit to taste.
#
# Design principle: extract and destroy. If an email has extractable value
# (invoice, tracking, dates, amounts), capture it to JSONL first; then the
# envelope is disposable. If the email has no extractable value (e.g. a
# verification code), it can be deleted on schedule.
#
# v1 supports lifecycle only (archive, trash). Extraction lands in v2. Until
# then, policies for senders with extractable data should set archive_after_days
# but NOT delete_after_days — we don't want to destroy information we haven't
# captured.

# =============================================================================
# CATEGORY A — zero extractable value, safe to delete on schedule
# =============================================================================

# Verification codes — nothing to capture; the code itself is ephemeral
[[policy]]
name = "verification-codes"
subject_contains = "verification code"
delete_after_days = 3

# Password resets — same
[[policy]]
name = "password-resets"
subject_contains = "reset your password"
delete_after_days = 3

# =============================================================================
# CATEGORY B — has extractable data; v1 archives only, v2 will extract + destroy
# =============================================================================

# Royal Mail: extract tracking number, expected delivery (v2)
[[policy]]
name = "royal-mail"
from = "@royalmail.com"
archive_after_days = 3
# delete_after_days deferred until extractor captures tracking + delivery date

# Amazon shipping (not receipts): extract tracking, expected arrival (v2)
[[policy]]
name = "amazon-shipping"
from = "@shipping.amazon.co.uk"
subject_not_contains = "receipt"
archive_after_days = 7
# delete_after_days deferred

# Stripe payment events: KEEP in inbox (billing-relevant live data).
# Extractor will capture invoice_id, amount, currency, paid_at — feeds Xero reconciliation.
[[policy]]
name = "stripe-billing"
from = "notifications@stripe.com"
on_arrival.tags_add = ["billing"]
# no archive, no delete — these stay visible until you process them

# Uber trips (not receipts): extract trip date, route, fare (v2)
[[policy]]
name = "uber-trips"
from = "@uber.com"
subject_not_contains = "receipt"
archive_after_days = 2
# delete deferred

# Uber receipts: tax-relevant. Extract receipt number, amount, date (v2).
[[policy]]
name = "uber-receipts"
from = "@uber.com"
subject_contains = "receipt"
on_arrival.tags_add = ["receipts"]
archive_after_days = 7
# never delete — tax/audit

# Zoom invites: extract meeting date, topic, host URL (v2)
[[policy]]
name = "zoom-invites"
from = "@zoom.us"
archive_after_days = 7
# delete deferred until extractor captures meeting metadata
