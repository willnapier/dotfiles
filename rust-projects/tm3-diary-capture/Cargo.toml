[package]
name = "tm3-diary-capture"
version = "0.1.0"
edition = "2021"
description = "Parse TM3 clinical diary HTML snapshots into DayPage checklists"

[dependencies]
clap = { version = "4", features = ["derive"] }
anyhow = "1"
chrono = "0.4"
regex = "1"
scraper = "0.22"
dirs = "6"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
headless_chrome = "1.0"

[[bin]]
name = "tm3-diary-capture"
path = "src/main.rs"

[[bin]]
name = "tm3-client-add"
path = "src/client_add.rs"

[dev-dependencies]
tempfile = "3.24.0"
